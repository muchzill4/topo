version: 2
project_name: topo

before:
  hooks:
    - go mod tidy

builds:
  - id: topo
    main: ./cmd/topo
    binary: topo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s
      - -w
      - -X github.com/arm/topo/internal/version.Version={{ .Version }}
      - -X github.com/arm/topo/internal/version.GitCommit={{ .Commit }}

archives:
  - id: archive
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - topo
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - "^refactor:"

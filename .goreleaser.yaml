version: 2
project_name: topo

before:
  hooks:
    - go mod tidy

builds:
  - id: topo
    main: ./cmd/topo
    binary: topo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s
      - -w
      - -X github.com/arm/topo/internal/version.Version={{ .Version }}
      - -X github.com/arm/topo/internal/version.GitCommit={{ .Commit }}

release:
  skip_upload: true

archives:
  - id: archive
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - topo
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  format: "{{ .Message }}{{ if .Logins }} ({{ .Logins | englishJoin }}){{ end }}"
  sort: asc
  abbrev: -1
  filters:
    include:
      - '^(feat|fix|perf|security|breaking|build)(\\([^)]+\\))?: .*$'
      # Scan for breaking changes
      - '^.*!:.*$'
  groups:
    - title: Breaking Changes
      # Examples: "feat!: drop legacy flags", "fix(auth)!: change token format", "BREAKING CHANGE: drop v1 API"
      regexp: '^.*?!:.*$|^.*BREAKING CHANGE:.*$'
      order: 0
    - title: Features / Enhancements
      # Examples: "feat: add export command", "feat(api): add /v2 endpoints"
      regexp: '^.*?feat(\([[:word:]]+\))??:.*$'
      order: 1
    - title: Bug Fixes
      # Examples: "fix: handle nil config", "fix(auth): suggest correct fix for auth failure"
      regexp: '^.*?fix(\([[:word:]]+\))??:.*$'
      order: 2

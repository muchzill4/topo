name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: One of 'Major', 'Minor', 'Patch', or 'Pre-release'.
        required: true
        type: choice
        default: Pre-release
        options:
          - Major
          - Minor
          - Patch
          - Pre-release

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false
      - name: Calculate next version
        id: version
        run: |
          latest_release=$(gh release list --limit 100 --json tagName --jq '[.[].tagName | gsub("^v"; "") | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+"))] | sort_by(split("-")[0] | split(".") | map(tonumber)) | reverse | .[0] // empty')
          if [ -z "$latest_release" ]; then
            base="0.0.0"
          else
            base=${latest_release%%-*}
          fi
          IFS='.' read -r major minor patch <<< "$base"
          case "${{ inputs.release-type }}" in
            Major) new="$((major+1)).0.0";;
            Minor) new="$major.$((minor+1)).0";;
            Patch) new="$major.$minor.$((patch+1))";;
            Pre-release) new="$base-$(date +%Y-%m-%d-%H-%M-%S)";;
            *) echo "invalid release type"; exit 1;;
          esac
          echo "version=$new" >> $GITHUB_OUTPUT
          echo "Next version: $new"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set git config
        run: |
          git config --global user.email "topo-release@users.noreply.github.com"
          git config --global user.name "topo-release"

      - name: Create tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          install-only: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.version }}

      - name: delete the build folders now the archives are there
        run: find dist -maxdepth 1 -type d -name 'topo_*_*_v*' -exec rm -rf {} +

      - name: decompress the archives for signing
        run: |
          for archive in dist/*.tar.gz; do
            base="${archive##*/}"
            dir="dist/${base%.tar.gz}"
            mkdir -p "$dir"
            tar -xzf "$archive" -C "$dir"
          done
          for archive in dist/*.zip; do
            base="${archive##*/}"
            dir="dist/${base%.zip}"
            mkdir -p "$dir"
            unzip -o "$archive" -d "$dir"
          done

      - name: Upload unsigned macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: topo-v${{ steps.version.outputs.version }}-macos-unsigned
          path: |
            dist/topo_darwin_amd64
            dist/topo_darwin_arm64
          if-no-files-found: error

      - name: Upload unsigned Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: topo-v${{ steps.version.outputs.version }}-windows-unsigned
          path: |
            dist/topo_windows_amd64
            dist/topo_windows_arm64
          if-no-files-found: error

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: topo-v${{ steps.version.outputs.version }}-linux
          path: |
            dist/topo_linux_amd64
            dist/topo_linux_arm64
          if-no-files-found: error

      - name: Create draft GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --draft \
            --title "v${VERSION}" \
            --notes "Release v${VERSION} - signing in progress..."

      - name: Create GitHub App token for signer
        id: signer-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ML_REPO_ACCESS_APP_ID }}
          private-key: ${{ secrets.ML_REPO_ACCESS_PRIVATE_KEY }}
          owner: Arm-Debug
          repositories: signer

      - name: Trigger sign-and-release
        env:
          GH_TOKEN: ${{ steps.signer-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh workflow run sign-and-release.yml \
            --repo Arm-Debug/signer \
            --ref v2 \
            --field run-id=${{ github.run_id }} \
            --field release-version=${VERSION} \
            --field release-tag=v${VERSION} \

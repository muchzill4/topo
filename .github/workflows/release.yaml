name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: One of 'Major', 'Minor', 'Patch', or 'Pre-release'.
        required: true
        type: choice
        default: Pre-release
        options:
          - Major
          - Minor
          - Patch
          - Pre-release

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false
      - name: Calculate next version
        id: version
        run: |
          latest_release=$(gh release list --limit 100 --json tagName --jq '[.[].tagName | gsub("^v"; "") | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+"))] | sort_by(split("-")[0] | split(".") | map(tonumber)) | reverse | .[0] // empty')
          if [ -z "$latest_release" ]; then
            base="0.0.0"
          else
            base=${latest_release%%-*}
          fi
          IFS='.' read -r major minor patch <<< "$base"
          case "${{ inputs.release-type }}" in
            Major) new="$((major+1)).0.0";;
            Minor) new="$major.$((minor+1)).0";;
            Patch) new="$major.$minor.$((patch+1))";;
            Pre-release) new="$base-$(date +%Y%m%d%H%M%S)";;
            *) echo "invalid release type"; exit 1;;
          esac
          echo "version=$new" >> $GITHUB_OUTPUT
          echo "Next version: $new"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set git config
        run: |
          git config --global user.email "topo-cli-release@users.noreply.github.com"
          git config --global user.name "topo-cli-release"

      - name: Create tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.version }}

      - name: Upload all archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: topo-cli-v${{ steps.version.outputs.version }}-archives
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

      - name: Upload unsigned macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: topo-cli-v${{ steps.version.outputs.version }}-macos-unsigned
          path: dist/topo_darwin_arm64_*/topo

      - name: Create GitHub App token for signer
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ML_REPO_ACCESS_APP_ID }}
          private-key: ${{ secrets.ML_REPO_ACCESS_PRIVATE_KEY }}
          owner: Arm-debug
          repositories: signer

      - name: Trigger signer workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: Arm-debug
          REPO: signer
          WORKFLOW_FILE: sign-and-post-macos.yml
          REF: main
          UPSTREAM_RUN_ID: ${{ github.run_id }}
        run: |
          gh workflow run "$WORKFLOW_FILE" \
            --repo "$OWNER/$REPO" \
            --ref "$REF" \
            -f "run-id=$UPSTREAM_RUN_ID" \
            -f "artifact=topo-cli-v${{ steps.version.outputs.version }}-macos-unsigned" \
            -f "release-version=${{ steps.version.outputs.version }}" \
            -f "repo-name=topo-cli" \
            -f "org-name=Arm-Debug" \
            -f "binary-name=topo" \

      - name: Trigger upload archives to artifactory workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: Arm-debug
          REPO: signer
          WORKFLOW_FILE: upload_archives_to_artifactory.yml
          REF: main
          UPSTREAM_RUN_ID: ${{ github.run_id }}
        run: |
          gh workflow run "$WORKFLOW_FILE" \
            --repo "$OWNER/$REPO" \
            --ref "$REF" \
            -f "run-id=$UPSTREAM_RUN_ID" \
            -f "release-version=${{ steps.version.outputs.version }}" \
            -f "archive-name=topo-cli-v${{ steps.version.outputs.version }}-archives" \
            -f "repo-name=topo-cli" \
            -f "org-name=Arm-Debug" \
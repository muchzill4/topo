name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Install svu
        run: |
          go install github.com/caarlos0/svu/v3@9324add
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Calculate next version
        id: calculate_next_version
        run: |
          if ! next="$(svu next)"; then
            echo "svu failed" >&2
            exit 1
          fi
          echo "next_version=$next" >> "$GITHUB_OUTPUT"

      - name: Set git config
        run: |
          git config --global user.email "topo-release@users.noreply.github.com"
          git config --global user.name "topo-release"

      - name: Create tag
        run: |
          git tag -a "${{ steps.calculate_next_version.outputs.next_version }}" -m "Release ${{ steps.calculate_next_version.outputs.next_version }}"
          git push origin "${{ steps.calculate_next_version.outputs.next_version }}"

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          install-only: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.calculate_next_version.outputs.next_version }}

      - name: delete the build folders now the archives are there
        run: find dist -maxdepth 1 -type d -name 'topo_*_*_v*' -exec rm -rf {} +

      - name: decompress the archives for signing
        run: |
          for archive in dist/*.tar.gz; do
            base="${archive##*/}"
            dir="dist/${base%.tar.gz}"
            mkdir -p "$dir"
            tar -xzf "$archive" -C "$dir"
          done
          for archive in dist/*.zip; do
            base="${archive##*/}"
            dir="dist/${base%.zip}"
            mkdir -p "$dir"
            unzip -o "$archive" -d "$dir"
          done

      - name: Upload unsigned macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: topo-${{ steps.calculate_next_version.outputs.next_version }}-macos-unsigned
          path: |
            dist/topo_darwin_amd64
            dist/topo_darwin_arm64
          if-no-files-found: error

      - name: Upload unsigned Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: topo-${{ steps.calculate_next_version.outputs.next_version }}-windows-unsigned
          path: |
            dist/topo_windows_amd64
            dist/topo_windows_arm64
          if-no-files-found: error

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: topo-${{ steps.calculate_next_version.outputs.next_version }}-linux
          path: |
            dist/topo_linux_amd64
            dist/topo_linux_arm64
          if-no-files-found: error

      - name: Create GitHub App token for signer
        id: signer-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ML_REPO_ACCESS_APP_ID }}
          private-key: ${{ secrets.ML_REPO_ACCESS_PRIVATE_KEY }}
          owner: Arm-Debug
          repositories: topo-signer

      - name: Trigger sign-and-release
        env:
          GH_TOKEN: ${{ steps.signer-token.outputs.token }}
          VERSION: ${{ steps.calculate_next_version.outputs.next_version }}
        run: |
          gh workflow run sign-and-release.yml \
            --repo Arm-Debug/topo-signer \
            --ref v4 \
            --field run-id=${{ github.run_id }} \
            --field release-version=${VERSION} \
            --field release-tag=${VERSION} \

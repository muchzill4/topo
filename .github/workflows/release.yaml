name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: One of 'Major', 'Minor', 'Patch', or 'Pre-release'.
        required: true
        type: choice
        default: Pre-release
        options:
          - Major
          - Minor
          - Patch
          - Pre-release

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Calculate next version
        id: version
        run: |
          latest_release=$(gh release list --limit 100 --json tagName --jq '[.[].tagName | gsub("^v"; "") | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+"))] | sort_by(split("-")[0] | split(".") | map(tonumber)) | reverse | .[0] // empty')
          if [ -z "$latest_release" ]; then
            base="0.0.0"
          else
            base=${latest_release%%-*}
          fi
          IFS='.' read -r major minor patch <<< "$base"
          case "${{ inputs.release-type }}" in
            Major) new="$((major+1)).0.0";;
            Minor) new="$major.$((minor+1)).0";;
            Patch) new="$major.$minor.$((patch+1))";;
            Pre-release) new="$base-$(date +%Y%m%d%H%M%S)";;
            *) echo "invalid release type"; exit 1;;
          esac
          echo "version=$new" >> $GITHUB_OUTPUT
          echo "Next version: $new"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set git config
        run: |
          git config --global user.email "topo-cli-release@users.noreply.github.com"
          git config --global user.name "topo-cli-release"

      - name: Create tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.version }}

      - name: Configure Artifactory proxy
        id: artifactory-proxy
        uses: Arm-Debug/artifactory-proxy-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish archives to Artifactory
        run: |
          set -euo pipefail
          shopt -s nullglob
          upload_base="${ARTIFACTORY_HOST}/artifactory/topo-cli/${RELEASE_VERSION}"

          archives=(dist/*.tar.gz dist/*.zip)
          if [ ${#archives[@]} -eq 0 ]; then
            echo "::error::No archives found in dist/"
            exit 1
          fi

          checksum_file="dist/checksums.txt"
          if [ ! -f "$checksum_file" ]; then
            echo "::error::Expected $checksum_file to exist"
            exit 1
          fi

          artifacts_to_upload=("${archives[@]}" "$checksum_file")

          for file in "${artifacts_to_upload[@]}"; do
            artifact_name=$(basename "$file")
            remote_path="${upload_base}/${artifact_name}"
            echo "Uploading $file to $remote_path"
            curl -u "${ARTIFACTORY_USER}:${ARTIFACTORY_TOKEN}" \
              -X PUT "$remote_path" -T "$file" --fail-with-body
          done
        env:
          ARTIFACTORY_HOST: ${{ steps.artifactory-proxy.outputs.artifactory-host }}
          ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_PASSWORD }}
          RELEASE_VERSION: v${{ steps.version.outputs.version }}

name: Release

on:
  workflow_dispatch:
    inputs:
      pre-release:
        description: Pre-release
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Install svu
        run: |
          go install github.com/caarlos0/svu/v3@9324add
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Calculate next version
        id: calculate_next_version
        run: |
          if [ "${{ inputs.pre-release }}" = "true" ]; then
            next="$(svu prerelease --prerelease pre)"
          else
            next="$(svu next)"
          fi
          echo "next_version=$next" >> "$GITHUB_OUTPUT"

      - name: Set git config
        run: |
          git config --global user.email "topo-release@users.noreply.github.com"
          git config --global user.name "topo-release"

      - name: Create tag
        run: |
          git tag -a "${{ steps.calculate_next_version.outputs.next_version }}" -m "Release ${{ steps.calculate_next_version.outputs.next_version }}"
          git push origin "${{ steps.calculate_next_version.outputs.next_version }}"

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          install-only: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.calculate_next_version.outputs.next_version }}

      - name: delete the build folders now the archives are there
        run: find dist -maxdepth 1 -type d -name 'topo_*_*_v*' -exec rm -rf {} +

      - name: decompress the archives for signing
        run: |
          for archive in dist/*.tar.gz; do
            base="${archive##*/}"
            dir="dist/${base%.tar.gz}"
            mkdir -p "$dir"
            tar -xzf "$archive" -C "$dir"
          done
          for archive in dist/*.zip; do
            base="${archive##*/}"
            dir="dist/${base%.zip}"
            mkdir -p "$dir"
            unzip -o "$archive" -d "$dir"
          done

      - name: Upload unsigned macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: topo-${{ steps.calculate_next_version.outputs.next_version }}-macos-unsigned
          path: |
            dist/topo_darwin_amd64
            dist/topo_darwin_arm64
          if-no-files-found: error

      - name: Upload unsigned Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: topo-${{ steps.calculate_next_version.outputs.next_version }}-windows-unsigned
          path: |
            dist/topo_windows_amd64
            dist/topo_windows_arm64
          if-no-files-found: error

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: topo-${{ steps.calculate_next_version.outputs.next_version }}-linux
          path: |
            dist/topo_linux_amd64
            dist/topo_linux_arm64
          if-no-files-found: error

      - name: Create GitHub App token for publisher
        id: publisher-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ML_REPO_ACCESS_APP_ID }}
          private-key: ${{ secrets.ML_REPO_ACCESS_PRIVATE_KEY }}
          owner: Arm-Debug
          repositories: topo-publisher

      - name: Trigger sign-and-release
        id: trigger_sign_and_release
        env:
          GH_TOKEN: ${{ steps.publisher-token.outputs.token }}
          VERSION: ${{ steps.calculate_next_version.outputs.next_version }}
        run: |
          gh workflow run sign-and-release.yml \
            --repo Arm-Debug/topo-publisher \
            --ref v8 \
            --field source-run-id=${{ github.run_id }} \
            --field release-version=${VERSION} \
            --field pre-release=${{ inputs.pre-release }}

          echo "Waiting for topo-publisher sign-and-release run to be created"
          publisher_run_title="${{ github.run_id }}"
          publisher_run_id=""
          for attempt in {1..30}; do
            publisher_run_id="$(gh run list \
              --repo Arm-Debug/topo-publisher \
              --workflow sign-and-release.yml \
              --branch v8 \
              --event workflow_dispatch \
              --limit 5 \
              --json createdAt,databaseId,displayTitle \
              --jq "map(select(.displayTitle == \"$publisher_run_title\")) | .[0].databaseId // empty")"

            if [ -n "$publisher_run_id" ]; then
              echo "publisher_run_id=$publisher_run_id" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Publisher workflow run is not visible yet; retrying in 10 seconds ($attempt/30)"
            sleep 10
          done

          echo "::error::Timed out waiting for topo-publisher sign-and-release run to be created"
          exit 1

      - name: Wait for publisher release links artifact
        env:
          GH_TOKEN: ${{ steps.publisher-token.outputs.token }}
          PUBLISHER_RUN_ID: ${{ steps.trigger_sign_and_release.outputs.publisher_run_id }}
          ARTIFACT_NAME: release-links
        run: |
          echo "Waiting for $ARTIFACT_NAME artifact from topo-publisher run $PUBLISHER_RUN_ID"

          for attempt in {1..30}; do
            artifact_id="$(gh api \
              "repos/Arm-Debug/topo-publisher/actions/runs/$PUBLISHER_RUN_ID/artifacts" \
              --jq ".artifacts | map(select(.name == \"$ARTIFACT_NAME\")) | .[0].id // empty")"

            if [ -n "$artifact_id" ]; then
              echo "Found $ARTIFACT_NAME artifact: $artifact_id"
              gh run download "$PUBLISHER_RUN_ID" \
                --repo Arm-Debug/topo-publisher \
                --name "$ARTIFACT_NAME" \
                --dir publisher-artifacts
              exit $?
            fi

            status="$(gh run view "$PUBLISHER_RUN_ID" \
              --repo Arm-Debug/topo-publisher \
              --json status \
              --jq .status)"

            conclusion="$(gh run view "$PUBLISHER_RUN_ID" \
              --repo Arm-Debug/topo-publisher \
              --json conclusion \
              --jq '.conclusion // ""')"

            if [ "$status" = "completed" ]; then
              echo "::error::topo-publisher run completed with conclusion '$conclusion' before producing $ARTIFACT_NAME"
              exit 1
            fi

            echo "$ARTIFACT_NAME is not available yet; publisher run status is $status; retrying in 60 seconds ($attempt/30)"
            sleep 60
          done

          echo "::error::Timed out waiting for $ARTIFACT_NAME artifact from topo-publisher run $PUBLISHER_RUN_ID"
          exit 1

      - name: Update and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: arm/topo
          RELEASE_TAG: ${{ steps.calculate_next_version.outputs.next_version }}
          PRE_RELEASE: ${{ inputs.pre-release }}
        run: |
          gh api repos/{owner}/{repo}/releases/generate-notes \
            -f tag_name="$RELEASE_TAG" \
            --jq .body > existing_body.md

          {
            cat publisher-artifacts/release_links.md
            printf '\n\n## Changelog\n'
            cat existing_body.md
          } > combined_notes.md

          if [ "$PRE_RELEASE" = "true" ]; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --prerelease --notes-file combined_notes.md
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file combined_notes.md
          fi
